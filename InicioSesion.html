<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Educlic</title>
    <link rel="stylesheet" href="styles.css">
    
</head>
<body>
    <div class="container">
        <h1>Educlic - Inicio de Sesión</h1>
        <label for="usuario">Usuario:</label>
        <input type="text" id="usuario" placeholder="Ingrese su usuario">

        <label for="contrasena">Contraseña:</label>
        <input type="password" id="contrasena" placeholder="Ingrese su contraseña">

        <button id="btnIniciarSesion">Iniciar Sesión</button>

        <div id="resultados">Bienvenido a Educlic. Ingresa tus credenciales para continuar.</div>
    </div>
    <script src="proyecto.js"></script>

</body>
</html>
